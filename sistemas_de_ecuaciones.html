<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolutor de Sistemas Lineales</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Pequeño ajuste para quitar las flechas de los input type number en algunos navegadores */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">

    <nav class="w-full max-w-6xl mx-auto mb-6 bg-white/95 border border-slate-200 rounded-2xl shadow-sm px-4 py-3">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <a href="index.html" class="flex items-center gap-2 font-bold text-slate-900">
                <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-white">↩</span>
                Menú principal
            </a>
            <div class="flex flex-wrap gap-2 text-sm">
                <a class="rounded-xl px-3 py-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition" href="index.html">Inicio</a>
                <a class="rounded-xl px-3 py-2 bg-indigo-600 text-white font-semibold shadow-sm" href="sistemas_de_ecuaciones.html">Sistemas</a>
                <a class="rounded-xl px-3 py-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition" href="matriz_inversa.html">Matriz inversa</a>
                <a class="rounded-xl px-3 py-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition" href="bases_espacios_vectoriales.html">Espacios vectoriales</a>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- Encabezado -->
        <header class="flex items-center gap-3 pb-4 border-b border-slate-200">
            <div class="bg-indigo-600 p-2 rounded-lg flex items-center justify-center">
                <i class="ph ph-calculator text-white text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Resolutor de Sistemas Lineales</h1>
                <p class="text-slate-500 text-sm">Calculadora gráfica para ecuaciones 2x2</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Panel Izquierdo: Controles y Resultados -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- Tarjeta de Entrada de Datos -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        Ingresa las ecuaciones
                    </h2>
                    
                    <div class="space-y-6">
                        <!-- Ecuación 1 -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Ecuación 1 (Recta Azul)</label>
                            <div class="flex items-center gap-2 text-lg font-mono">
                                <input type="number" id="a1" value="1" class="coef-input w-20 text-center p-2 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition" />
                                <span>x +</span>
                                <input type="number" id="b1" value="1" class="coef-input w-20 text-center p-2 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition" />
                                <span>y =</span>
                                <input type="number" id="c1" value="4" class="coef-input w-20 text-center p-2 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition" />
                            </div>
                        </div>

                        <!-- Ecuación 2 -->
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Ecuación 2 (Recta Roja)</label>
                            <div class="flex items-center gap-2 text-lg font-mono">
                                <input type="number" id="a2" value="1" class="coef-input w-20 text-center p-2 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition" />
                                <span>x +</span>
                                <input type="number" id="b2" value="-1" class="coef-input w-20 text-center p-2 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition" />
                                <span>y =</span>
                                <input type="number" id="c2" value="2" class="coef-input w-20 text-center p-2 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none transition" />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tarjeta de Resultados (Se inyecta dinámicamente) -->
                <div id="result-container" class="p-6 rounded-xl border shadow-sm transition-colors duration-300 bg-white border-slate-200">
                    <!-- Contenido dinámico -->
                </div>
                
            </div>

            <!-- Panel Derecho: Gráfica -->
            <div class="lg:col-span-7">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 h-full flex flex-col">
                    <h2 class="text-lg font-semibold mb-4 px-2">Visualización Gráfica</h2>
                    <div class="flex-1 w-full bg-slate-50 rounded-lg overflow-hidden border border-slate-200 relative min-h-[400px]">
                        <!-- El SVG se dibuja aquí -->
                        <svg id="graph-svg" viewBox="0 0 600 600" class="w-full h-full drop-shadow-sm absolute inset-0"></svg>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Lógica de la Aplicación -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Referencias a los inputs
            const inputs = document.querySelectorAll('.coef-input');
            const resultContainer = document.getElementById('result-container');
            const graphSvg = document.getElementById('graph-svg');

            // Función principal para calcular y actualizar
            function calculateSystem() {
                // Obtener valores
                const a1 = parseFloat(document.getElementById('a1').value) || 0;
                const b1 = parseFloat(document.getElementById('b1').value) || 0;
                const c1 = parseFloat(document.getElementById('c1').value) || 0;
                const a2 = parseFloat(document.getElementById('a2').value) || 0;
                const b2 = parseFloat(document.getElementById('b2').value) || 0;
                const c2 = parseFloat(document.getElementById('c2').value) || 0;

                const coefs = { a1, b1, c1, a2, b2, c2 };

                // Regla de Cramer
                const d = a1 * b2 - a2 * b1;
                const dx = c1 * b2 - c2 * b1;
                const dy = a1 * c2 - a2 * c1;

                const EPSILON = 1e-10;
                let result = null;

                if (Math.abs(d) > EPSILON) {
                    const x = dx / d;
                    const y = dy / d;
                    result = { type: 'unique', x, y, message: 'El sistema tiene una solución única.' };
                } else {
                    if (Math.abs(dx) < EPSILON && Math.abs(dy) < EPSILON) {
                        if (a1 === 0 && b1 === 0 && c1 !== 0) {
                            result = { type: 'none', message: 'La ecuación 1 es una inconsistencia lógica (0 = ' + c1 + ').' };
                        } else if (a2 === 0 && b2 === 0 && c2 !== 0) {
                            result = { type: 'none', message: 'La ecuación 2 es una inconsistencia lógica (0 = ' + c2 + ').' };
                        } else {
                            result = { type: 'infinite', message: 'El sistema tiene infinitas soluciones. Ambas rectas son la misma.' };
                        }
                    } else {
                        result = { type: 'none', message: 'El sistema no tiene solución. Las rectas son paralelas y nunca se cruzan.' };
                    }
                }

                updateResultUI(result);
                drawGraph(coefs, result);
            }

            // Actualizar el panel de resultados HTML
            function updateResultUI(result) {
                // Limpiar clases previas
                resultContainer.className = "p-6 rounded-xl border shadow-sm transition-colors duration-300";
                
                let html = "";

                if (result.type === 'unique') {
                    resultContainer.classList.add('bg-emerald-50', 'border-emerald-200');
                    const displayX = Number.isInteger(result.x) ? result.x : result.x.toFixed(4);
                    const displayY = Number.isInteger(result.y) ? result.y : result.y.toFixed(4);
                    
                    html = `
                        <div>
                            <div class="flex items-center gap-2 text-emerald-700 font-bold mb-2">
                                <i class="ph-fill ph-check-circle text-xl"></i>
                                <h3>¡Solución Encontrada!</h3>
                            </div>
                            <p class="text-emerald-800 text-sm mb-4">${result.message}</p>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-white p-3 rounded border border-emerald-100 flex flex-col items-center shadow-sm">
                                    <span class="text-emerald-500 text-xs font-bold uppercase tracking-wider mb-1">Valor de X</span>
                                    <span class="text-2xl font-mono font-bold text-slate-800">${displayX}</span>
                                </div>
                                <div class="bg-white p-3 rounded border border-emerald-100 flex flex-col items-center shadow-sm">
                                    <span class="text-emerald-500 text-xs font-bold uppercase tracking-wider mb-1">Valor de Y</span>
                                    <span class="text-2xl font-mono font-bold text-slate-800">${displayY}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (result.type === 'infinite') {
                    resultContainer.classList.add('bg-blue-50', 'border-blue-200');
                    html = `
                        <div>
                            <div class="flex items-center gap-2 text-blue-700 font-bold mb-2">
                                <i class="ph-fill ph-info text-xl"></i>
                                <h3>Soluciones Infinitas</h3>
                            </div>
                            <p class="text-blue-800 text-sm">${result.message}</p>
                            <p class="text-blue-800 text-sm mt-2">El conjunto de soluciones es el lugar geométrico descrito por la recta en el plano.</p>
                        </div>
                    `;
                } else if (result.type === 'none') {
                    resultContainer.classList.add('bg-red-50', 'border-red-200');
                    html = `
                        <div>
                            <div class="flex items-center gap-2 text-red-700 font-bold mb-2">
                                <i class="ph-fill ph-warning text-xl"></i>
                                <h3>Sin Solución</h3>
                            </div>
                            <p class="text-red-800 text-sm">${result.message}</p>
                        </div>
                    `;
                }

                resultContainer.innerHTML = html;
            }

            // Dibujar la gráfica en el SVG
            function drawGraph(coefs, result) {
                const size = 600;
                
                // Centro y rango
                const cx = result?.type === 'unique' ? result.x : 0;
                const cy = result?.type === 'unique' ? result.y : 0;
                const range = 10;
                
                const minX = cx - range;
                const maxX = cx + range;
                const minY = cy - range;
                const maxY = cy + range;

                // Mapeos de escala
                const toSvgX = (x) => ((x - minX) / (maxX - minX)) * size;
                const toSvgY = (y) => size - ((y - minY) / (maxY - minY)) * size;

                let svgContent = `<g id="grid">`;

                // Cuadrícula y Ejes
                for (let i = Math.floor(minX); i <= Math.ceil(maxX); i++) {
                    const stroke = i === 0 ? "#94a3b8" : "#e2e8f0";
                    const width = i === 0 ? 2 : 1;
                    svgContent += `<line x1="${toSvgX(i)}" y1="0" x2="${toSvgX(i)}" y2="${size}" stroke="${stroke}" stroke-width="${width}" />`;
                    
                    if (i !== 0 && i % 2 === 0) {
                        let labelY = cy >= minY && cy <= maxY ? toSvgY(0) + 15 : size - 10;
                        svgContent += `<text x="${toSvgX(i)}" y="${labelY}" font-size="12" fill="#64748b" text-anchor="middle">${i}</text>`;
                    }
                }
                for (let i = Math.floor(minY); i <= Math.ceil(maxY); i++) {
                    const stroke = i === 0 ? "#94a3b8" : "#e2e8f0";
                    const width = i === 0 ? 2 : 1;
                    svgContent += `<line x1="0" y1="${toSvgY(i)}" x2="${size}" y2="${toSvgY(i)}" stroke="${stroke}" stroke-width="${width}" />`;
                    
                    if (i !== 0 && i % 2 === 0) {
                        let labelX = cx >= minX && cx <= maxX ? toSvgX(0) - 10 : 20;
                        svgContent += `<text x="${labelX}" y="${toSvgY(i) + 4}" font-size="12" fill="#64748b" text-anchor="end">${i}</text>`;
                    }
                }
                svgContent += `</g>`;

                // Origen (0,0)
                if (cx >= minX && cx <= maxX && cy >= minY && cy <= maxY) {
                    svgContent += `<text x="${toSvgX(0) - 5}" y="${toSvgY(0) + 15}" font-size="12" fill="#64748b" text-anchor="end">0</text>`;
                }

                // Función auxiliar para obtener puntos de cruce en pantalla
                const getLinePoints = (a, b, c) => {
                    let pts = [];
                    const EPSILON = 1e-10;

                    if (Math.abs(b) > EPSILON) {
                        let y1 = (c - a * minX) / b;
                        let y2 = (c - a * maxX) / b;
                        pts.push({ x: minX, y: y1 });
                        pts.push({ x: maxX, y: y2 });
                    } else if (Math.abs(a) > EPSILON) {
                        let x0 = c / a;
                        pts.push({ x: x0, y: minY });
                        pts.push({ x: x0, y: maxY });
                    }
                    return pts.map(p => ({ sx: toSvgX(p.x), sy: toSvgY(p.y) }));
                };

                // Línea 1 (Azul)
                const line1Pts = getLinePoints(coefs.a1, coefs.b1, coefs.c1);
                if (line1Pts.length === 2) {
                    svgContent += `<line x1="${line1Pts[0].sx}" y1="${line1Pts[0].sy}" x2="${line1Pts[1].sx}" y2="${line1Pts[1].sy}" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />`;
                }

                // Línea 2 (Roja)
                const line2Pts = getLinePoints(coefs.a2, coefs.b2, coefs.c2);
                if (line2Pts.length === 2) {
                    const dashArray = result?.type === 'infinite' ? "stroke-dasharray='10,10'" : "";
                    svgContent += `<line x1="${line2Pts[0].sx}" y1="${line2Pts[0].sy}" x2="${line2Pts[1].sx}" y2="${line2Pts[1].sy}" stroke="#ef4444" stroke-width="3" stroke-linecap="round" ${dashArray} />`;
                }

                // Punto de Intersección
                if (result?.type === 'unique') {
                    const displayX = Number.isInteger(result.x) ? result.x : result.x.toFixed(2);
                    const displayY = Number.isInteger(result.y) ? result.y : result.y.toFixed(2);
                    
                    svgContent += `
                        <g>
                            <circle cx="${toSvgX(result.x)}" cy="${toSvgY(result.y)}" r="6" fill="#10b981" stroke="white" stroke-width="2" />
                            <rect x="${toSvgX(result.x) + 10}" y="${toSvgY(result.y) - 26}" width="100" height="24" fill="white" fill-opacity="0.8" rx="4" />
                            <text x="${toSvgX(result.x) + 15}" y="${toSvgY(result.y) - 10}" font-size="14" font-weight="bold" fill="#064e3b">
                                (${displayX}, ${displayY})
                            </text>
                        </g>
                    `;
                }

                // Inyectar SVG
                graphSvg.innerHTML = svgContent;
            }

            // Escuchar cambios en cualquier input
            inputs.forEach(input => {
                input.addEventListener('input', calculateSystem);
            });

            // Cálculo inicial al cargar
            calculateSystem();
        });
    </script>
</body>
</html>
